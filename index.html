<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="公開資料をまとめた、明るく見やすい資料ページです。"
    />
    <title>公開資料用</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #19324d;
        --muted: #5f7891;
        --accent: #ff8a5b;
        --accent-dark: #e96a3f;
        --sky: #eaf8ff;
        --cream: #fff9ec;
      }

      * {
        box-sizing: border-box;
      }

      html {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-width: 320px;
        min-height: 0;
        overflow: hidden;
        color: var(--ink);
        font-family:
          "Hiragino Kaku Gothic ProN", "Yu Gothic", "YuGothic", Meiryo,
          sans-serif;
        background:
          radial-gradient(circle at 12% 15%, #ffffff 0 5%, transparent 28%),
          radial-gradient(circle at 92% 88%, #ffe8c4 0 4%, transparent 25%),
          linear-gradient(135deg, var(--sky) 0%, #fffdf4 48%, var(--cream) 100%);
      }

      .page {
        position: fixed;
        inset: 0;
        display: grid;
        width: auto;
        height: auto;
        min-height: 0;
        overflow: hidden;
        place-items: center;
        padding: 40px 24px;
        isolation: isolate;
      }

      @supports (height: 100dvh) {
        body {
          height: 100dvh;
        }

        .page {
          height: 100dvh;
        }
      }

      .decoration {
        position: absolute;
        z-index: -1;
        border-radius: 999px;
        filter: blur(1px);
        opacity: 0.72;
      }

      .decoration--sun {
        top: 9vh;
        right: 11vw;
        width: clamp(90px, 13vw, 190px);
        aspect-ratio: 1;
        background: #ffd76a;
        box-shadow: 0 0 0 22px rgb(255 215 106 / 12%), 0 0 70px #ffd76a;
      }

      .decoration--coral {
        bottom: -8vh;
        left: -4vw;
        width: clamp(180px, 27vw, 380px);
        aspect-ratio: 1;
        background: #ffb18e;
        opacity: 0.35;
      }

      .decoration--blue {
        top: 48%;
        right: -5vw;
        width: clamp(150px, 21vw, 300px);
        aspect-ratio: 1;
        background: #98ddf7;
        opacity: 0.3;
      }

      .content {
        width: min(100%, 960px);
        text-align: center;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin: 0 0 22px;
        color: var(--accent-dark);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.22em;
      }

      .eyebrow::before,
      .eyebrow::after {
        width: 28px;
        height: 2px;
        content: "";
        border-radius: 999px;
        background: currentColor;
      }

      h1 {
        margin: 0;
        font-size: clamp(3.4rem, 11vw, 8.5rem);
        font-weight: 900;
        line-height: 1.05;
        letter-spacing: 0.08em;
        text-shadow: 0.04em 0.06em 0 #ffffff;
      }

      .lead {
        max-width: 560px;
        margin: 28px auto 0;
        color: var(--muted);
        font-size: clamp(0.98rem, 2vw, 1.12rem);
        line-height: 1.9;
        letter-spacing: 0.08em;
      }

      .sunrise {
        display: flex;
        justify-content: center;
        margin: 42px auto 0;
      }

      .sunrise__line {
        position: relative;
        width: min(100%, 390px);
        height: 12px;
        border-radius: 999px;
        background: linear-gradient(90deg, #8ddcf5, #ffd565, #ff9c70);
        box-shadow: 0 8px 24px rgb(255 156 112 / 24%);
      }

      .sunrise__line::before,
      .sunrise__line::after {
        position: absolute;
        top: 50%;
        width: 9px;
        height: 9px;
        content: "";
        border-radius: 50%;
        background: #ffffff;
        transform: translateY(-50%);
        box-shadow: 0 0 0 5px rgb(255 255 255 / 48%);
      }

      .sunrise__line::before {
        left: 0;
      }

      .sunrise__line::after {
        right: 0;
      }

      .footer-note {
        margin: 30px 0 0;
        color: #87a0b5;
        font-size: 0.77rem;
        letter-spacing: 0.16em;
      }

      @media (max-width: 600px) {
        .page {
          padding: 32px 20px;
        }

        .eyebrow {
          margin-bottom: 16px;
          font-size: 0.7rem;
        }

        .eyebrow::before,
        .eyebrow::after {
          width: 18px;
        }

        .lead {
          margin-top: 22px;
          letter-spacing: 0.04em;
        }

        .sunrise {
          margin-top: 32px;
        }
      }

      @media (prefers-reduced-motion: no-preference) {
        .decoration--sun {
          animation: float 7s ease-in-out infinite;
        }

        .content {
          animation: appear 0.8s ease-out both;
        }

        @keyframes float {
          0%,
          100% {
            transform: translateY(0);
          }

          50% {
            transform: translateY(-12px);
          }
        }

        @keyframes appear {
          from {
            opacity: 0;
            transform: translateY(12px);
          }

          to {
            opacity: 1;
            transform: translateY(0);
          }
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <div class="decoration decoration--sun" aria-hidden="true"></div>
      <div class="decoration decoration--coral" aria-hidden="true"></div>
      <div class="decoration decoration--blue" aria-hidden="true"></div>

      <section class="content" aria-labelledby="page-title">
        <p class="eyebrow">PUBLIC MATERIALS</p>
        <h1 id="page-title">公開資料用</h1>
        <p class="lead">
          必要な資料を、いつでも見つけやすく。<br />
          公開用コンテンツをここにまとめています。
        </p>
        <div class="sunrise" aria-hidden="true">
          <div class="sunrise__line"></div>
        </div>
        <p class="footer-note">WELCOME</p>
      </section>
    </main>
  </body>
</html>
